enableScripts: false

nodeLinker: node-modules

npmMinimalAgeGate: 7d

npmPreapprovedPackages: []

# Include local yarn plugins (bundled) as an E2E test.
# If something breaks and the bundles are deleted, you may need to temporarily comment this out.
plugins:
  # yarn-plugin-npmrc simplifies auth for the release pipeline by reusing .npmrc.
  # It's enabled (npmrcAuthEnabled) only for ADO publish by preparePublishRegistry.ts.
  - path: yarn-plugins/engines/dist/plugin.js
  # yarn-plugin-engines enforces the repo-root engines.node requirement across dependencies.
  - path: yarn-plugins/npmrc/dist/plugin.js

preferReuse: true

yarnPath: .yarn/releases/yarn-4.17.0.cjs

catalogs:
  prod:
    commander: ^14.0.3
    workspace-tools: ^0.41.10
