enableScripts: false

nodeLinker: node-modules

npmMinimalAgeGate: 7d

npmPreapprovedPackages: []

# Include local yarn plugins (bundled) as an E2E test.
# If something breaks and the bundles are deleted, you may need to temporarily comment this out.
plugins:
  # yarn-plugin-engines enforces the repo-root engines.node requirement across dependencies.
  - path: yarn-plugins/engines/dist/plugin.js
  # yarn-plugin-npmrc simplifies auth for the release pipeline by reusing .npmrc.
  # It's enabled (YARN_NPMRC_AUTH_ENABLED) only for ADO publish by .ado/release.yml.
  - path: yarn-plugins/npmrc/dist/plugin.js

preferReuse: true

yarnPath: .yarn/releases/yarn-4.17.1.cjs

catalogs:
  prod:
    '@yarnpkg/core': ^4.7.0
    commander: ^14.0.3
    execa: ^5.1.1
    semver: ^7.7.4
    workspace-tools: ^0.41.10
  dev:
    '@types/semver': ^7.3.13
    cross-env: ^10.1.0
    eslint: ^10.0.0
    # tsgo provides the `tsc` binary
    ts7: npm:typescript@~7.0.0
    # compat package provides require("typescript") for typescript-eslint
    typescript: npm:@typescript/typescript6@^6.0.0

# engines:
#   includeDevDependencies: true
