# The release pipeline to publish public NPM packages via ESRP ("beachball - ESRP npm release").
#
# See comments in release.yml for why this is separate.
# This pipeline consumes release.yml's artifacts via a `pipelines` resource.

# Name of the run
name: beachball-esrp-release-$(Date:yyyy-MM-dd).$(Rev:rr)

pr: none
trigger: none

resources:
  pipelines:
    # must match pipelineAlias variable (here and in release.yml)
    - pipeline: main-release
      project: ISS
      # must match the UI name of release.yml
      source: beachball - release
      # Auto-trigger this pipeline when release.yml's `build` stage completes.
      # (release.yml has a later stage which waits for this pipeline to complete.)
      trigger:
        branches:
          include:
            - main
        stages:
          - build

  repositories:
    - repository: OfficePipelineTemplates
      type: git
      name: 1ESPipelineTemplates/OfficePipelineTemplates
      ref: refs/tags/release

parameters:
  # TODO (release): go back to a single publish step
  - name: npmPublishes
    type: object
    default:
      - groupName: canary
        artifactPathVariable: canaryArtifactPath
        npmTag: next
      - groupName: others
        artifactPathVariable: packagesArtifactPath
        npmTag: latest

variables:
  nodeVersion: 24
  tags: production
  pipelineAlias: main-release
  packagesArtifactName: packed-packages
  canaryArtifactName: packed-packages-canary
  toolArtifactName: release-api-tool

extends:
  template: v1/Office.Official.PipelineTemplate.yml@OfficePipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      image: windows-latest
      os: windows # We need windows because compliance task only run on windows.

    stages:
      - stage: publish
        displayName: Publish packages
        jobs:
          - job: npm_publish
            displayName: NPM to npmjs.com

            variables:
              packagesArtifactPath: $(Agent.BuildDirectory)\${{ variables.packagesArtifactName }}
              canaryArtifactPath: $(Agent.BuildDirectory)\${{ variables.canaryArtifactName }}
              toolArtifactPath: $(Agent.BuildDirectory)\${{ variables.toolArtifactName }}

            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                - input: pipelineArtifact
                  pipeline: ${{ variables.pipelineAlias }}
                  artifactName: ${{ variables.packagesArtifactName }}
                  targetPath: $(packagesArtifactPath)
                - input: pipelineArtifact
                  pipeline: ${{ variables.pipelineAlias }}
                  artifactName: ${{ variables.canaryArtifactName }}
                  targetPath: $(canaryArtifactPath)
                - input: pipelineArtifact
                  pipeline: ${{ variables.pipelineAlias }}
                  artifactName: ${{ variables.toolArtifactName }}
                  targetPath: $(toolArtifactPath)

            steps:
              - task: UseNode@1
                displayName: Install Node.js ${{ variables.nodeVersion }}
                retryCountOnTaskFailure: 1
                inputs:
                  version: ${{ variables.nodeVersion }}.x
                  checkLatest: false

              - script: |
                  echo "Contents of $(packagesArtifactPath)"
                  dir /S $(packagesArtifactPath)
                  echo "Contents of $(canaryArtifactPath)"
                  dir /S $(canaryArtifactPath)
                  echo "Contents of $(toolArtifactPath)"
                  dir /S $(toolArtifactPath)
                displayName: Show packages artifact contents

              # Get credentials that will be used to temporarily upload zips to ogxesrptempstorage
              # in the OGX azure subscription
              - task: AzureCLI@2
                displayName: Get credentials for staging blob storage
                inputs:
                  # this is the service connection name
                  azureSubscription: ogx-esrp-infra-bot
                  scriptType: pscore
                  scriptLocation: inlineScript
                  addSpnToEnvironment: true
                  inlineScript: |
                    Write-Host "##vso[task.setvariable variable=STAGING_TENANT_ID]$env:tenantId"
                    Write-Host "##vso[task.setvariable variable=STAGING_CLIENT_ID]$env:servicePrincipalId"
                    Write-Host "##vso[task.setvariable variable=STAGING_ID_TOKEN;issecret=true]$env:idToken"

              # Fetch ESRP certificates from key vault in Torus
              - task: AzureKeyVault@2
                displayName: Get ESRP certificates from Key Vault
                inputs:
                  # torus service connection name ("connectedservicename" from EsrpRelease task)
                  azureSubscription: ESRP-JSHost3
                  # "keyvaultname" from EsrpRelease task
                  KeyVaultName: OGX-JSHost-KV
                  # "authcertname" and "signcertname" from EsrpRelease task
                  SecretsFilter: OGX-JSHost-Auth4,OGX-JSHost-Sign3

              # Publish each set of packed packages under its npm dist-tag.
              # (Beachball doesn't really need ordered publishing, but we want to test the helper.)
              - ${{ each publish in parameters.npmPublishes }}:
                  - script: node $(toolArtifactPath)\index.mjs
                    displayName: '(${{ publish.groupName }}) npm publish using ESRP Release API'
                    retryCountOnTaskFailure: 3
                    env:
                      PACKED_PACKAGES_PATH: $(${{ publish.artifactPathVariable }})
                      # ideally would be "beachball" but isn't used anywhere meaningful
                      ESRP_PRODUCT_NAME: beachball-${{ publish.groupName }}
                      ESRP_NPM_TAG: ${{ publish.npmTag }}
                      ESRP_USER: elcraig@microsoft.com
                      ESRP_APPROVERS: dannyvv@microsoft.com
                      # torus tenant ID ("domaintenantid" from EsrpRelease task, same as service connection "ESRP-JSHost3")
                      ESRP_TENANT_ID: cdc5aeea-15c5-4db6-b079-fcadd2505dc2
                      # "clientid" from EsrpRelease task
                      ESRP_CLIENT_ID: 0a35e01f-eadf-420a-a2bf-def002ba898d
                      ESRP_AUTH_CERT: $(OGX-JSHost-Auth4)
                      ESRP_REQUEST_SIGNING_CERT: $(OGX-JSHost-Sign3)
                      STAGING_STORAGE_ACCOUNT_NAME: ogxesrptempstorage
                      STAGING_CLIENT_ID: $(STAGING_CLIENT_ID)
                      STAGING_TENANT_ID: $(STAGING_TENANT_ID)
                      STAGING_ID_TOKEN: $(STAGING_ID_TOKEN)
