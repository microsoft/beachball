# The prepublish pipeline to build and pack NPM packages ("beachball - prepublish")
# Based on https://github.com/microsoft/node-api-dotnet/blob/main/.ado/publish.yml
# see also https://github.com/microsoft/fluentui/blob/master/azure-pipelines.release.yml
# references:
# https://eng.ms/docs/coreai/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates/overview
# https://eng.ms/docs/coreai/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates/migration/office-specific-guidance

# Name of the run
# NOTE: this is referenced in packages/beachball/src/env.ts as BUILD_BUILDNUMBER for some tests
name: beachball-prepublish-$(Date:yyyy-MM-dd).$(Rev:rr)

# This script must never be triggered from YAML settings for security reasons.
pr: none
trigger: none

resources:
  repositories:
    - repository: OfficePipelineTemplates
      type: git
      name: 1ESPipelineTemplates/OfficePipelineTemplates
      ref: refs/tags/release

variables:
  - name: nodeVersion
    value: 24
  - name: tags
    value: production
    readonly: true

extends:
  template: v1/Office.Official.PipelineTemplate.yml@OfficePipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      image: windows-latest
      os: windows # We need windows because compliance task only run on windows.
    sdl:
      codeql:
        runSourceLanguagesInSourceAnalysis: true

    stages:
      - stage: main
        jobs:
          - job: build
            displayName: Build, test, pack
            cancelTimeoutInMinutes: 45 # to allow more time to collect CodeQL debug info.

            pool:
              name: Azure-Pipelines-1ESPT-ExDShared
              image: ubuntu-latest
              os: linux

            workspace:
              clean: all

            templateContext:
              outputParentDirectory: $(Build.StagingDirectory)/out
              outputs:
                - output: pipelineArtifact
                  artifactName: packed-packages
                  path: $(Build.StagingDirectory)/out/packed-packages
                - output: pipelineArtifact
                  artifactName: release-api-tool
                  path: $(Build.StagingDirectory)/out/release-api-tool

            steps:
              - checkout: self

              - task: UseNode@1
                displayName: Install Node.js ${{ variables.nodeVersion }}
                retryCountOnTaskFailure: 1
                inputs:
                  version: ${{ variables.nodeVersion }}.x
                  checkLatest: false

              # For multiline scripts, we want the whole task to fail if any line of the script fails.
              # ADO doesn't have bash configured this way by default. To fix we override the SHELLOPTS built-in variable.
              # https://www.gnu.org/software/bash/manual/html_node/The-Set-Builtin.html
              # The options below include ADO defaults (braceexpand:hashall:interactive-comments) plus
              # errexit:errtrace for better error behavior.
              - script: |
                  echo "##vso[task.setvariable variable=shellopts]braceexpand:hashall:interactive-comments:errexit:errtrace"
                displayName: Force exit on error (bash)

              - script: |
                  echo "node: `node -v`"
                  echo "yarn: `yarn -v`"
                  echo "npm: `npm -v`"
                  echo
                  printenv | sort
                  echo
                  git --no-pager config list
                displayName: Show environment

              - script: node scripts/preparePublishRegistry.ts
                displayName: Prepare npm registry settings

              - task: npmAuthenticate@0
                displayName: npm authenticate
                inputs:
                  workingFile: $(Build.SourcesDirectory)/.npmrc

              # This isn't used, it's just a clear way to check that auth is working
              # (yarn install's auth errors can be very unclear)
              - script: yarn npm info beachball
                displayName: Get package to verify yarn auth

              - script: yarn --immutable
                displayName: Install dependencies

              - script: yarn build --verbose
                displayName: Build

              - script: yarn test --verbose
                displayName: Test

              - task: AzureCLI@2
                displayName: Create GitHub App token
                inputs:
                  azureSubscription: ogx-oss-release-bot
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: node scripts/create-github-app-token.cjs
                env:
                  APP_CLIENT_ID: Iv23ligBoU5jc9SIFnGR
                  KEY_ID: https://ogx-oss-release-keyvault.vault.azure.net/keys/office-ogx-auth-helper-key
                  OWNER: microsoft
                  REPOSITORIES: beachball
                  PERMISSIONS: contents:write
                  OUTPUT: azure-pipelines
                  AZURE_TOKEN_VARIABLE: REPO_PAT

              # TODO (release): switch back to regular release
              # (temporarily add yarn release:canary when ready)
              - script: |
                  set +x
                  git config user.email "2742274+office-ogx-auth-helper[bot]@users.noreply.github.com"
                  git config user.name "OGX bot"

                  # Fail fast if the token wasn't produced or isn't a GitHub App installation token.
                  # GitHub App installation tokens start with "ghs_".
                  if [[ -z "$REPO_PAT" ]]; then
                    echo "error: REPO_PAT is empty; the token creation step did not produce a token" >&2
                    exit 1
                  fi
                  if [[ "$REPO_PAT" != ghs_* ]]; then
                    echo "error: REPO_PAT is not in the expected GitHub App installation token format (ghs_...)" >&2
                    exit 1
                  fi

                  # Set a temporary auth header for git operations and clean it up when done
                  authHeader=$(printf "x-access-token:%s" "$REPO_PAT" | base64 | tr -d '\n')
                  trap "git config --unset-all http.https://github.com/.extraheader" EXIT
                  git config http.https://github.com/.extraheader "AUTHORIZATION: basic $authHeader"

                  yarn release:others --git-tags=false --verbose --pack-to-path '$(Build.StagingDirectory)/out/packed-packages'
                # ^ TODO re-enable tagging
                displayName: Publish packages (non-prerelease)
                env:
                  REPO_PAT: $(REPO_PAT)

              # # TODO: figure out if this should bump or not (currently does bump)
              # # and currently uses a prerelease prefix of 'test' to avoid interfering with real versions
              # # TODO: update beachball to read the registry from .npmrc and/or .yarnrc.yml
              # # TODO (release): change back to:
              # # yarn beachball publish --prerelease-prefix test --no-push --pack-to-path '$(Build.StagingDirectory)/out/packed-packages'
              # - script: |
              #     yarn release:canary --no-push --verbose --pack-to-path '$(Build.StagingDirectory)/out/packed-packages'
              #   displayName: Pack packages (canary)

              - script: |
                  mkdir -p $(Build.StagingDirectory)/out/release-api-tool
                  cp -r packages/esrp-npm-release/dist/index.js $(Build.StagingDirectory)/out/release-api-tool
                displayName: Copy release API tool to staging directory

              - script: ls -R '$(Build.StagingDirectory)/out'
                displayName: Show all output files
