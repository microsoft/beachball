# The release pipeline to build, test, and pack NPM packages ("beachball - release").
# It also waits for the ESRP release pipeline and then pushes back to git.
#
# References:
# https://eng.ms/docs/coreai/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates/overview
# https://eng.ms/docs/coreai/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates/migration/office-specific-guidance
# https://github.com/microsoft/node-api-dotnet/blob/main/.ado/publish.yml
# https://github.com/microsoft/fluentui/blob/master/azure-pipelines.release.yml
#
# IMPORTANT: the ESRP release step must be in a separate pipeline (release-esrp.yml).
# Any pipeline with a job `type: releaseJob` has stricter network isolation policies applied,
# and 1ES PT networkIsolationPolicy can only be set at the pipeline level.
# These policies break the GitHub and private npm feed access required for this pipeline.
# The ESRP pipeline consumes this pipeline's artifacts via a `pipelines` resource.

# Name of the run
# NOTE: this is referenced in packages/beachball/src/env.ts as BUILD_BUILDNUMBER for some tests
name: beachball-release-$(Date:yyyy-MM-dd).$(Rev:rr)

# This script must never be triggered from YAML settings for security reasons.
pr: none
trigger: none

resources:
  repositories:
    - repository: OfficePipelineTemplates
      type: git
      name: 1ESPipelineTemplates/OfficePipelineTemplates
      ref: refs/tags/release

variables:
  tags: production
  packagesArtifactName: packed-packages
  # TODO (release): remove all canary artifacts
  canaryArtifactName: packed-packages-canary
  toolArtifactName: release-api-tool
  # ID of the ADO pipeline for release-esrp.yml (definitionId in the URL)
  esrpPipelineId: 36941
  # Must match pipelineAlias in release-esrp.yml
  pipelineAlias: main-release

extends:
  template: v1/Office.Official.PipelineTemplate.yml@OfficePipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      image: windows-latest
      os: windows # We need windows because compliance task only run on windows.
    featureFlags:
      incrementalSDLSourceAnalysis: true
    sdl:
      codeql:
        runSourceLanguagesInSourceAnalysis: true

    stages:
      # "build" match the stage name trigger in release-esrp.yml
      - stage: build
        displayName: Build artifacts
        jobs:
          - job: build
            displayName: Build, test, pack

            pool:
              name: Azure-Pipelines-1ESPT-ExDShared
              image: ubuntu-latest
              os: linux

            workspace:
              clean: all

            variables:
              artifactPath: $(Build.StagingDirectory)/out
              packagesArtifactPath: $(Build.StagingDirectory)/out/${{ variables.packagesArtifactName }}
              canaryArtifactPath: $(Build.StagingDirectory)/out/${{ variables.canaryArtifactName }}
              toolArtifactPath: $(Build.StagingDirectory)/out/${{ variables.toolArtifactName }}

            templateContext:
              outputParentDirectory: $(artifactPath)
              outputs:
                - output: pipelineArtifact
                  artifactName: ${{ variables.packagesArtifactName }}
                  path: $(packagesArtifactPath)
                - output: pipelineArtifact
                  artifactName: ${{ variables.canaryArtifactName }}
                  path: $(canaryArtifactPath)
                - output: pipelineArtifact
                  artifactName: ${{ variables.toolArtifactName }}
                  path: $(toolArtifactPath)

            steps:
              - template: templates/setup.yml

              - script: yarn build --verbose
                displayName: Build

              - script: yarn test --verbose
                displayName: Test

              - script: mkdir -p "$(canaryArtifactPath)" "$(packagesArtifactPath)"
                displayName: Create package artifact directories

              - script: yarn beachball:release canary --pack-to-path "$(canaryArtifactPath)"
                displayName: Pack packages (canary)

              - script: yarn beachball:release publish --no-push --pack-to-path "$(packagesArtifactPath)"
                displayName: Pack packages (others)

              # main benefit of copying is so SDL scanning can run once on outputParentDirectory
              - script: |
                  mkdir -p '$(toolArtifactPath)'
                  cp -r packages/esrp-npm-release/dist/index.mjs '$(toolArtifactPath)'
                displayName: Copy release API tool to staging directory

              - script: ls -R '$(artifactPath)'
                displayName: Show all output files

      # Wait for the separate ESRP release pipeline to complete (see comment at top for why it's separate)
      - stage: poll_and_push
        displayName: Wait for release and push to git
        dependsOn: build
        jobs:
          - job: poll_and_push
            pool:
              name: Azure-Pipelines-1ESPT-ExDShared
              image: ubuntu-latest
              os: linux
            steps:
              - template: templates/setup.yml

              - script: node scripts/awaitRelease.ts
                displayName: Await release completion
                env:
                  AUTH_TOKEN: $(System.AccessToken)
                  ESRP_PIPELINE_ID: $(esrpPipelineId)
                  PUBLISH_PIPELINE_ALIAS: $(pipelineAlias)

              - task: AzureCLI@2
                displayName: Get token
                inputs:
                  azureSubscription: ogx-oss-release-bot
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: node scripts/create-github-app-token.cjs
                env:
                  # office-ogx-auth-helper GitHub App
                  APP_CLIENT_ID: Iv23ligBoU5jc9SIFnGR
                  KEY_ID: https://ogx-oss-release-keyvault.vault.azure.net/keys/office-ogx-auth-helper-key
                  REPOSITORIES: $(Build.Repository.ID)
                  PERMISSIONS: contents:write
                  OUTPUT: azure
                  AZURE_TOKEN_VARIABLE: GITHUB_APP_TOKEN

              # TODO (release): update task name
              - script: node scripts/publishWithGithubAppToken.ts
                displayName: Publish non-prerelease packages
                env:
                  GITHUB_APP_TOKEN: $(GITHUB_APP_TOKEN)
