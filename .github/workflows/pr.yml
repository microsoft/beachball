# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: PR

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # For PRs, use the ref (branch) in the concurrency group so that new pushes cancel any old runs.
  # For pushes to main, ideally we wouldn't set a concurrency group, but github actions doesn't
  # support conditional blocks of settings, so we use the SHA so the "group" is unique.
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        npm: [8]
        include:
          - os: ubuntu-latest
            # npm 6 and 8 have slightly different behavior with verdaccio in publishing tests.
            # It's unclear if this translates to meaningful differences in behavior in actual scenarios,
            # but test against both versions to be safe. (Only do this on the ubuntu build for speed.)
            npm: 6

    name: build (${{ matrix.os }}, npm ${{ matrix.npm }})

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Node.js from .nvmrc
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          cache: yarn
          node-version-file: .nvmrc

      # Guarantee a predictable version of npm for the first round of tests
      - name: Install npm@${{ matrix.npm }}
        run: npm install --global npm@${{ matrix.npm }}

      - run: yarn --frozen-lockfile

      - run: yarn build

      - run: yarn checkchange --verbose

      - run: yarn lint

      - run: yarn test:unit

      - run: yarn test:func

      - run: yarn test:e2e

  # The docs have a separate installation using Node 22 due to needing newer dependencies
  docs:
    name: build docs

    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Node.js 22
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          cache: yarn
          node-version: 24

      - run: yarn --immutable
        working-directory: ./docs

      - run: yarn docs:build
        working-directory: ./docs

  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    name: build rust (${{ matrix.os }})

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Format
        run: cargo fmt --check
        working-directory: ./rust

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings
        working-directory: ./rust

      - name: Build
        run: cargo build
        working-directory: ./rust

      - name: Test
        run: cargo test
        working-directory: ./rust

  go:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    name: build go (${{ matrix.os }})

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Format
        run: test -z "$(gofmt -l .)"
        working-directory: ./go

      - name: Lint
        run: go vet ./...
        working-directory: ./go

      - name: Build
        run: go build ./...
        working-directory: ./go

      - name: Test
        run: go test ./...
        working-directory: ./go
